<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemistry Quiz</title>

<style>
/* (Your CSS remains EXACTLY the same — no changes needed) */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: white;
  display: flex;
  flex-direction: column;
  white-space: pre-line;
}

.container {
  max-width: 850px;
  margin: 40px auto;
  padding: 20px;
  flex: 1;
}

h1 {
  text-align: center;
  font-size: 3rem;
  margin-bottom: 10px;
  background: linear-gradient(to right, #00ffea, #ff00cc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  text-align: center;
  margin-bottom: 40px;
  opacity: 0.85;
}

#loading { text-align:center; margin-top:80px; }

.spinner {
  width: 65px;
  height: 65px;
  margin:auto;
  border:6px solid rgba(255,255,255,0.15);
  border-top:6px solid #00ffea;
  border-radius:50%;
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.question-card {
  background: rgba(255,255,255,0.08);
  padding: 35px;
  border-radius: 20px;
}

.options button {
  width: 100%;
  padding: 18px;
  margin: 5px 0;
  border-radius: 14px;
  cursor: pointer;
}

.options button.correct { background:#00ff9d; color:black; }
.options button.wrong { background:#ff4d6d; }

#feedback { margin: 20px 0; text-align:center; }

footer {
  text-align:center;
  padding:20px;
  background:#0f172a;
}

#retry-btn {
  margin-top: 15px;
  background: #ff4d6d;
  color: white;
  padding: 10px 20px;
  border-radius: 25px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1>🧪 BTA Chemistry Quiz</h1>
  <p class="subtitle">Powered by Bush Software Inc.</p>

  <p id="progress"></p>

  <div id="loading">
    <div class="spinner"></div>
    <p>Loading questions...</p>
  </div>

  <div id="quiz-container" style="display:none;"></div>
</div>

<footer>
<p>&copy; 2026 Bush Teaching Assistant</p>
</footer>

<script>

const studentName = "{{name}}";
const studentClass = "{{ student_class }}";
const studentPhone = "{{ phone }}";

// ✅ STORAGE KEY
const STORAGE_KEY = "bta_quiz_first_attempt_score";

let allQuestions = [];
let currentIndex = 0;
let userAnswers = [];

// Shuffle
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// ✅ LOAD QUESTIONS
async function loadQuestions() {

  // 🔒 CHECK FIRST ATTEMPT
  const saved = localStorage.getItem(STORAGE_KEY);

  if (saved) {
    showSavedScore(JSON.parse(saved));
    return;
  }

  try {
    const res = await fetch('/questions/energy_and_energy_changes');
    const data = await res.json();

    shuffleArray(data.questions);

    allQuestions = data.questions.slice(0, 50);
    userAnswers = new Array(allQuestions.length).fill(null);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('quiz-container').style.display = 'block';

    showQuestion();

  } catch (err) {
    document.getElementById('loading').innerHTML =
      "<p style='color:red;'>Failed to load questions</p>";
  }
}

// SHOW QUESTION
function showQuestion() {
  const q = allQuestions[currentIndex];

  document.getElementById('progress').textContent =
    `Question ${currentIndex + 1} of ${allQuestions.length}`;

  let optionsHTML = '';
  q.options.forEach(opt => {
    optionsHTML += `<button>${opt}</button>`;
  });

  document.getElementById('quiz-container').innerHTML = `
    <div class="question-card">
      <h2>${q.question}</h2>
      <div class="options">${optionsHTML}</div>
      <div id="feedback"></div>
      <button onclick="next()">Next</button>
    </div>
  `;

  document.querySelectorAll('.options button').forEach(btn => {
    btn.onclick = () => selectAnswer(btn, q);
  });
}

// SELECT ANSWER
function selectAnswer(btn, q) {
  const selected = btn.textContent.charAt(0);
  userAnswers[currentIndex] = selected;

  document.querySelectorAll('.options button').forEach(b => {
    b.disabled = true;
    const letter = b.textContent.charAt(0);

    if (letter === q.answer) b.classList.add('correct');
    if (b === btn && selected !== q.answer) b.classList.add('wrong');
  });

  document.getElementById('feedback').innerHTML =
    selected === q.answer ? "✅ Correct" : "❌ Wrong";
}

// NEXT
function next() {
  currentIndex++;
  if (currentIndex >= allQuestions.length) {
    showScore();
  } else {
    showQuestion();
  }
}

// ✅ SAVE + SHOW SCORE
function showScore() {
  let score = 0;

  allQuestions.forEach((q, i) => {
    if (userAnswers[i] === q.answer) score++;
  });

  const total = allQuestions.length;
  const percent = Math.round((score / total) * 100);

  // 🔒 SAVE ONLY FIRST TIME
  if (!localStorage.getItem(STORAGE_KEY)) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      score,
      total,
      percent,
      name: studentName,
      class: studentClass,
      phone: studentPhone
    }));
  }

  showSavedScore({
    score, total, percent,
    name: studentName,
    class: studentClass,
    phone: studentPhone
  });
}

// ✅ SHOW SAVED SCORE
function showSavedScore(data) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('quiz-container').style.display = 'block';

  document.getElementById('quiz-container').innerHTML = `
    <div class="question-card">
      <h2>First Attempt Score</h2>
      <h1>${data.score} / ${data.total}</h1>
      <h3>${data.percent}%</h3>

      <p><b>Name:</b> ${data.name}</p>
      <p><b>Class:</b> ${data.class}</p>
      <p><b>Phone:</b> ${data.phone}</p>

      <button id="retry-btn" onclick="resetQuiz()">Reset</button>
    </div>
  `;
}

// RESET
function resetQuiz() {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

// START
window.onload = loadQuestions;

</script>

</body>
</html>
