<script>

const studentName = "{{name}}";
const studentClass = "{{ student_class }}";
const studentPhone = "{{ phone }}";

const STORAGE_KEY = "bta_quiz_first_attempt_score";

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

let allQuestions = [];
let currentIndex = 0;
let userAnswers = [];

// LOAD QUESTIONS
async function loadQuestions() {

  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    showSavedScore(JSON.parse(saved));
    return;
  }

  const loadingEl = document.getElementById('loading');
  const quizEl = document.getElementById('quiz-container');

  try {
    const res = await fetch('/questions/energy_and_energy_changes');
    const data = await res.json();

    shuffleArray(data.questions);

    allQuestions = data.questions.slice(0, 50);
    userAnswers = new Array(allQuestions.length).fill(null);

    loadingEl.style.display = 'none';
    quizEl.style.display = 'block';

    showQuestion();

  } catch (error) {
    loadingEl.innerHTML = `<p style="color:red;">Failed to load questions</p>`;
  }
}

// SHOW QUESTION
function showQuestion() {
  const q = allQuestions[currentIndex];

  document.getElementById('progress').textContent =
    `Question ${currentIndex + 1} of ${allQuestions.length}`;

  let optionsHTML = '';
  q.options.forEach(opt => {
    optionsHTML += `<button>${opt}</button>`;
  });

  document.getElementById('quiz-container').innerHTML = `
    <div class="question-card">
      <h2>${q.question}</h2>
      <div class="options">${optionsHTML}</div>

      <div id="feedback"></div>
      <div id="explanation"></div>

      <a href="https://wa.me/233554454161" target="_blank">
        Click here for further explanation from your teacher (Bush)
      </a>

      <div class="btn-group">
        <button id="prev-btn" onclick="prev()">← Previous</button>
        <button id="skip-btn" onclick="skip()">Skip →</button>
        <button id="next-btn" onclick="next()" style="display:none;">Next</button>
      </div>
    </div>
  `;

  const buttons = document.querySelectorAll('.options button');
  buttons.forEach(btn => btn.onclick = () => selectAnswer(btn, q));

  if (currentIndex === 0) {
    document.getElementById('prev-btn').disabled = true;
    document.getElementById('prev-btn').style.opacity = 0.5;
  }

  if (currentIndex === allQuestions.length - 1) {
    document.getElementById('skip-btn').disabled = true;
    document.getElementById('skip-btn').style.opacity = 0.5;
  }

  if (userAnswers[currentIndex] !== null) {
    const saved = userAnswers[currentIndex];
    buttons.forEach(btn => {
      const letter = btn.textContent.charAt(0);
      if (letter === q.answer) btn.classList.add('correct');
      if (letter === saved && saved !== q.answer) btn.classList.add('wrong');
      btn.disabled = true;
    });
    showExplanation(q);
    document.getElementById('next-btn').style.display = 'inline-block';
  }
}

// SELECT ANSWER
function selectAnswer(btn, q) {
  const selected = btn.textContent.charAt(0);
  userAnswers[currentIndex] = selected;

  document.querySelectorAll('.options button').forEach(b => {
    b.disabled = true;
    const letter = b.textContent.charAt(0);
    if (letter === q.answer) b.classList.add('correct');
    if (b === btn && selected !== q.answer) b.classList.add('wrong');
  });

  const feedback = document.getElementById('feedback');
  feedback.innerHTML = selected === q.answer 
    ? `<span style="color:#00ff9d;">✓ Correct!</span>`
    : `<span style="color:#ff4d6d;">✗ Wrong!</span>`;

  showExplanation(q);

  document.getElementById('next-btn').style.display = 'inline-block';
}

// SHOW EXPLANATION
function showExplanation(q) {
  const exp = document.getElementById('explanation');
  exp.innerHTML = `<strong>Explanation:</strong><br>${q.explanation || 'No explanation provided.'}`;
  exp.style.display = 'block';
}

// NAVIGATION (✅ SCROLL FIX ADDED)

function next() {
  currentIndex++;

  window.scrollTo({ top: 0, behavior: "smooth" });

  if (currentIndex >= allQuestions.length) return showScore();
  showQuestion();
}

function prev() {
  if (currentIndex > 0) {
    currentIndex--;

    window.scrollTo({ top: 0, behavior: "smooth" });

    showQuestion();
  }
}

function skip() {
  currentIndex++;

  window.scrollTo({ top: 0, behavior: "smooth" });

  if (currentIndex >= allQuestions.length) return showScore();
  showQuestion();
}

// SCORE
function showScore() {
  let score = 0;

  allQuestions.forEach((q, i) => {
    if (userAnswers[i] === q.answer) score++;
  });

  const total = allQuestions.length;
  const percent = Math.round((score / total) * 100);

  if (!localStorage.getItem(STORAGE_KEY)) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      score, total, percent,
      name: studentName,
      class: studentClass,
      phone: studentPhone
    }));
  }

  showSavedScore({ score, total, percent, name: studentName, class: studentClass, phone: studentPhone });
}

// SHOW SAVED SCORE
function showSavedScore(data) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('quiz-container').style.display = 'block';

  document.getElementById('quiz-container').innerHTML = `
    <div class="question-card result-box">
      <h2>Quiz Completed (First Attempt)</h2>
      <div class="final-score">${data.score} / ${data.total}</div>
      <div class="percentage">${data.percent}%</div>

      <p><strong>Student Name:</strong> ${data.name}</p>
      <p><strong>Class:</strong> ${data.class}</p>
      <p><strong>Phone Number:</strong> ${data.phone}</p>

      <a href="https://wa.me/233554454161" target="_blank">
        Take a snapshot and send your score to Bush
      </a>
    </div>
  `;
}

window.onload = loadQuestions;

</script>
