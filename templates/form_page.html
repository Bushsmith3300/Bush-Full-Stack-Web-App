<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bush Teaching Assistant - WAEC Past Questions & Customized Tests for Ghanaian SHS Students">
    <meta name="author" content="Emmanuel Asiamah Amponsah">
    <meta name="keywords" content="chemistry, WAEC, past questions, SHS, teaching assistant, Ghana education">
    <title>Bush Teaching Assistant | WAEC Chemistry Revision</title>
  <title>Bush Teaching Assistant | Start Quiz</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
      text-align: center;
    }

    /* 🔵 LOGO */
    .logo {
      width: 85px;
      height: 85px;
      margin: 0 auto 15px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 2px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    }

    .school-name {
      font-weight: 600;
      color: #2a5298;
      margin-bottom: 8px;
      font-size: 15px;
    }

    h1 {
      font-size: 20px;
      color: #333;
      margin-bottom: 5px;
    }

    h2 {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
      font-weight: 400;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
      transition: 0.3s;
      font-size: 14px;
    }

    input:focus {
      border-color: #2a5298;
      box-shadow: 0 0 6px rgba(42,82,152,0.3);
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2a5298;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: 500;
    }

    button:hover {
      background: #1e3c72;
      transform: translateY(-1px);
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- 🔵 BTA LOGO -->
    <div class="logo">BTA</div>

    <div class="school-name">Bush Teaching Assistant</div>

    <h1>Welcome 👋</h1>
    <h2>Enter your details to start the quiz</h2>

    <form method="POST" action="/submit">
      <input type="text" name="name" placeholder="Enter your full name" required>
      <input type="text" name="class" placeholder="Your class ( e.g. 2 Science 7 )" required>
      <input type="tel" name="phone" placeholder="Phone number ( e.g. 0554454161 )" required>

      <button type="submit">Start Quiz 🚀</button>
    </form>

  </div>

<footer class="footer">
    <div class="footer-content">
        <p>&copy; 2026 Bush Teaching Assistant</p>
        <p>Connecting learners and educators</p>
        <p>Developed by Emmanuel Asiamah Amponsah</p>  
    </div>
 </footer>
    
</body>
</html>
