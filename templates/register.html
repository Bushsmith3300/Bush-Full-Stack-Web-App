<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Standard Chemistry Questions for Ghanaian SHS Learners!">
  <meta name="author" content="Emmanuel Asiamah Amponsah">
  <meta name="keywords" content="chemistry, past questions, WAEC, teaching assistant, asiamah, learn">
    
  <title>Register | BTA Quiz App</title>

<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    .container {
        background: #ffffff;
        padding: 30px;
        width: 400px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #1e3c72;
    }

    .error {
        background: #ffe6e6;
        color: #cc0000;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 15px;
        text-align: center;
        font-size: 14px;
    }

    label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
        font-size: 14px;
        color: #333;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
        transition: 0.3s;
    }

    input:focus {
        border-color: #1e3c72;
        box-shadow: 0 0 5px rgba(30,60,114,0.3);
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        background: #1e3c72;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #16325c;
    }

    .login-link {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    .login-link a {
        color: #1e3c72;
        text-decoration: none;
        font-weight: bold;
    }

    .login-link a:hover {
        text-decoration: underline;
    }
</style>
</head>

<body>

<div class="container">
 
   {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
       <div class="{{ category }}">
         {{ message }}
      </div>
      {% endfor %}
     {% endif %}
    {% endwith %}

    <h2>Create a BTA account</h2>


    <form method="POST" action="{{ url_for('register') }}">
      
        <label>Surname</label>
        <input type="text" name="surname" required>

        <label>First Name</label>
        <input type="text" name="first_name" required>

        <label>Other Name (Optional)</label>
        <input type="text" name="other_name">

        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required>

        <button type="submit">Create a BTA account</button>
    </form>

    <div class="login-link">
        <span style="color:#009900">Already have an account?</span> <a href="{{ url_for('login') }}">Login</a>
    </div>
</div>

</body>
</html>
